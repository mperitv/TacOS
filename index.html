<!DOCTYPE html>
<html>
<body style="margin: 0; overflow: hidden; background: #1500ff;">

<img src="tacos_background.PNG" width="100%" style="position: fixed; left: 0; bottom: 50px;">

<div style="position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); width: 380px; border: 2px solid #1500ff; font-family: Tahoma;">
    <div style="background: #1500ff; color: #ffffff; padding: 4px; font-size: 11px; font-weight: bold;">
        Welcome to TacOS
    </div>
    <div style="background: #ece9d8; padding: 20px;">
        <h1>Welcome to TacOS</h1>
        <h3>A WebOS with raining TacOS!</h3>
    </div>
</div>

<div id="tacoRain"></div>

<div style="position: fixed; bottom: 0; left: 0; width: 100%; height: 30px; display: flex; color: #ffffff; font-family: Tahoma; font-size: 11px; background: linear-gradient(to bottom, #4589e6, #1a52a5); border-top: 1px solid #6eb4ff;">
    <div style="padding: 0 14px; display: flex; align-items: center; font-weight: bold; background-color: #348534;">
        start
    </div>
    <div style="flex: 1; padding-left: 6px; display: flex; align-items: center;">
        TacOS
    </div>
    <div style="padding: 0 10px; display: flex; align-items: center; background-color: #1500ff;">
        <p id="timeElement" style="margin: 0;"></p>
    </div>
</div>

<script>
    var timeText = document.querySelector("#timeElement");
    timeText.innerHTML = new Date().toLocaleString();
    setInterval(function() {
        timeText.innerHTML = new Date().toLocaleString();
    }, 1000);

    var tacoRain = document.querySelector("#tacoRain");
    for (var i = 0; i < 30; i++) {
        var taco = document.createElement("span");
        taco.innerHTML = "🌮";
        taco.style.position = "absolute";
        taco.style.left = Math.random() * 100 + "vw";
        taco.style.fontSize = (16 + Math.random() * 24) + "px";
        taco.style.animation = "fall " + (4 + Math.random() * 6) + "s linear infinite";
        taco.style.animationDelay = Math.random() * 5 + "s";
        tacoRain.appendChild(taco);
    }
</script>

<style>
    #tacoRain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }
    @keyframes fall {
        from { transform: translateY(-50px); }
        to { transform: translateY(110vh); }
    }
</style>

</body>
</html>
